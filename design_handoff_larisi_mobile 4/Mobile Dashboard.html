<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Larisi — Mobile Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; background: #FAFAFB; font-family: 'Inter', -apple-system, sans-serif; color: #0E0E12; }
  * { -webkit-font-smoothing: antialiased; box-sizing: border-box; }
  button { font-family: inherit; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="screens/dapur-konten.jsx"></script>
<script type="text/babel" src="screens/dapur-alt.jsx"></script>
<script type="text/babel" src="screens/kelola-iklan.jsx"></script>
<script type="text/babel" src="screens/performa-iklan.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  return (
    <DesignCanvas title="Larisi — Mobile Dashboard" subtitle="Mobile version of Dapur Konten · 3 key screens">
      <DCSection id="dapur-flow" title="Dapur Konten" subtitle="Mulai · Susun · Tinjau">
        <DCArtboard id="home"  label="01 · Beranda"        width={390} height={844}><ScreenHome/></DCArtboard>
        <DCArtboard id="dapur" label="02 · Dapur Konten"   width={390} height={844}><ScreenDapur/></DCArtboard>
        <DCArtboard id="ai"    label="03 · AI + Preview"   width={390} height={844}><ScreenAI/></DCArtboard>
      </DCSection>
      <DCSection id="dapur-alt" title="Dapur Konten — Alternatif Sederhana" subtitle="Alt A: Wizard 1 langkah / layar · Alt B: Compact list">
        <DCArtboard id="wiz1" label="Alt A1 · Pilih aset"   width={390} height={844}><ScreenWizardAset/></DCArtboard>
        <DCArtboard id="wiz2" label="Alt A2 · Audiens"      width={390} height={844}><ScreenWizardAudiens/></DCArtboard>
        <DCArtboard id="wiz3" label="Alt A3 · Tinjau"       width={390} height={844}><ScreenWizardReview/></DCArtboard>
        <DCArtboard id="compact" label="Alt B · Compact list" width={390} height={844}><ScreenCompactList/></DCArtboard>
      </DCSection>
      <DCSection id="kelola-flow" title="Kelola Iklan" subtitle="List · Detail · Chat SiLaris">
        <DCArtboard id="kelola" label="04 · Kelola Iklan"   width={390} height={844}><ScreenKelola/></DCArtboard>
        <DCArtboard id="detail" label="05 · Detail Iklan"   width={390} height={844}><ScreenDetail/></DCArtboard>
        <DCArtboard id="silaris" label="06 · Chat SiLaris"  width={390} height={844}><ScreenSiLaris/></DCArtboard>
      </DCSection>
      <DCSection id="performa-flow" title="Performa Iklan" subtitle="Insight · Local Pulse · Tools">
        <DCArtboard id="performa"  label="07 · Insight"        width={390} height={844}><ScreenPerforma/></DCArtboard>
        <DCArtboard id="localpulse" label="08 · Local Pulse"    width={390} height={844}><ScreenLocalPulse/></DCArtboard>
        <DCArtboard id="tools"     label="09 · Tools & Competitor" width={390} height={844}><ScreenTools/></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
