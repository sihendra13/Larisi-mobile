<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mulai Coba Gratis - Larisi</title>
    <link rel="stylesheet" href="src/css/auth.css">
    <!-- Load FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="split-layout">
        <div class="split-left">
            <div class="auth-header">
                <img src="Assets/logo larisi.svg" alt="Larisi" onerror="this.outerHTML='<h2 style=\'color: var(--rausch); margin: 0;\'>Larisi <span style=\'font-size: 16px;\'>✦</span></h2>'">
            </div>

            <div class="auth-container">
        <h1>Mulai Uji Coba Gratis</h1>

        <!-- Badge paket yang dipilih dari landing page -->
        <div id="plan-badge" style="display:none; background:#f4f0ff; border:1px solid #7c3aed; border-radius:10px; padding:10px 14px; margin-bottom:20px; font-size:13px; color:#5b17b7; display:flex; align-items:center; gap:8px;">
            <span>🎯</span>
            <span id="plan-badge-text"></span>
        </div>

        <form action="onboarding.html" method="GET">
            <div class="form-row">
                <div class="form-group">
                    <label for="firstName">Nama Depan</label>
                    <input type="text" id="firstName" name="firstName" placeholder="Misal: Budi" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Nama Belakang</label>
                    <input type="text" id="lastName" name="lastName" placeholder="Misal: Santoso" required>
                </div>
            </div>

            <div class="form-group">
                <label for="email">Alamat Email</label>
                <input type="email" id="email" name="email" placeholder="budi@contoh.com" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" name="password" placeholder="Minimal 8 karakter" required>
                    <i class="fas fa-eye-slash toggle-password" onclick="togglePassword()" id="togglePasswordIcon"></i>
                </div>
            </div>

            <div class="form-group" style="margin-top: 16px; margin-bottom: 24px;">
                <label style="font-weight: 400; display: flex; align-items: flex-start; gap: 8px; font-size: 13px; color: var(--secondary); line-height: 1.4; cursor: pointer;">
                    <input type="checkbox" id="termsCheckbox" onchange="toggleSubmitBtn()" style="width: auto; margin-top: 2px; cursor: pointer;">
                    <span>Dengan mendaftar, Anda menyetujui <a href="https://larisi.id/syarat-ketentuan" target="_blank" rel="noopener noreferrer" class="terms-link">Syarat dan Ketentuan</a> serta <a href="https://larisi.id/kebijakan-privasi" target="_blank" rel="noopener noreferrer" class="terms-link">Kebijakan Privasi</a> kami.</span>
                </label>
            </div>

            <button type="submit" id="submitBtn" class="btn btn-primary" disabled>Create Account</button>
            
            <div class="login-link">
                Sudah punya akun? <a href="login.html">Masuk di sini</a>
            </div>
            

        </form>
            </div>
        </div>

        <div class="split-right"></div>
    </div>

    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('togglePasswordIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            } else {
                passwordInput.type = 'password';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            }
        }
        function toggleSubmitBtn() {
            const checkbox = document.getElementById('termsCheckbox');
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = !checkbox.checked;
        }

        const PLAN_LABELS = {
            freemium: 'Freemium – Gratis selamanya',
            starter:  'Starter – Coba 30 hari gratis',
            pro:      'Pro – Coba 30 hari gratis',
            trial:    'Pro – Coba 30 hari gratis'
        };

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const plan  = urlParams.get('plan')  || 'freemium';
            const trial = urlParams.get('trial') || '0';

            // Reset data trial lama dari sesi/browser sebelumnya
            // Mencegah modal "trial habis" muncul untuk user baru
            localStorage.removeItem('larisi_trial_start');

            localStorage.setItem('larisi_selected_plan', plan);
            localStorage.setItem('larisi_trial_days', trial);

            const badge = document.getElementById('plan-badge');
            const badgeText = document.getElementById('plan-badge-text');
            if (PLAN_LABELS[plan]) {
                badgeText.textContent = 'Paket dipilih: ' + PLAN_LABELS[plan];
                badge.style.display = 'flex';
            }
        });
    </script>

    <!-- Supabase SDK & Auth Logic -->
    <script src="src/js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="src/js/supabase.js"></script>
    <script>
        const form = document.querySelector('form');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            submitBtn.disabled = true;
            submitBtn.textContent = 'Memproses...';

            // Sign out sesi lama dulu — pastikan register selalu fresh
            try { await window.signOut && getSupabaseClient().auth.signOut(); } catch(e) {}

            const { data, error } = await window.signUp(email, password, {
                first_name: firstName,
                last_name: lastName,
                full_name: `${firstName} ${lastName}`
            });

            if (error) {
                alert('Gagal daftar: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            } else {
                // Selalu arahkan ke OTP step — biarkan onboarding.html yang handle
                // (jika Confirm Email OFF di Supabase, onboarding akan detect & skip OTP)
                const plan = localStorage.getItem('larisi_selected_plan') || 'freemium';
                window.location.href = 'onboarding.html?email=' + encodeURIComponent(email) + '&plan=' + encodeURIComponent(plan);
            }
        });
    </script>
</body>
</html>
