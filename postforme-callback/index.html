<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RADAR — Menghubungkan akun…</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      background: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.10);
      max-width: 340px;
      width: 90%;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    .title { font-size: 18px; font-weight: 700; color: #111827; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #6b7280; line-height: 1.5; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e5e7eb;
      border-top-color: #791ADB;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner" id="spinner"></div>
    <div class="title" id="title">Menghubungkan akun…</div>
    <div class="subtitle" id="subtitle">Tunggu sebentar, jendela ini akan menutup otomatis.</div>
  </div>

  <script>
    (function () {
      var params   = new URLSearchParams(window.location.search);
      var success  = params.get('isSuccess') === 'true';
      var ids      = params.get('accountIds') || '';
      var provider = params.get('provider')   || '';

      if (success && ids) {
        // Kirim ke window RADAR utama
        if (window.opener && !window.opener.closed) {
          try {
            window.opener.postMessage({
              type:       'postforme_oauth_success',
              accountIds: ids.split(',').map(function(s){ return s.trim(); }),
              provider:   provider
            }, window.location.origin);
          } catch(e) {}
        }

        // Tampilkan sukses, tutup popup
        document.getElementById('card').innerHTML =
          '<div class="icon">✅</div>' +
          '<div class="title">Akun berhasil terhubung!</div>' +
          '<div class="subtitle">Jendela ini akan menutup dalam 2 detik…</div>';

        setTimeout(function () { window.close(); }, 2000);

      } else {
        // Gagal atau dibatalkan
        document.getElementById('card').innerHTML =
          '<div class="icon">❌</div>' +
          '<div class="title">Koneksi dibatalkan</div>' +
          '<div class="subtitle">Silakan coba lagi dari RADAR.<br><br>' +
          '<span onclick="window.close()" style="color:#791ADB;cursor:pointer;font-weight:600;">Tutup jendela ini</span>' +
          '</div>';
      }
    })();
  </script>
</body>
</html>
